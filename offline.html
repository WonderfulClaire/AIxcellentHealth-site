<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私享管家 · 暂时离线</title>
  <style>
    /* 黑金风格 */
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0B0B0D; color: #ECE7D8;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
    }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { color: #D4AF37; font-size: 1.4rem; margin-bottom: 0.8rem; }
    p { color: rgba(236,231,216,.7); line-height: 1.7; font-size: 0.95rem; }
    .retry-btn {
      margin-top: 1.5rem; padding: 12px 28px;
      background: transparent; border: 1px solid #D4AF37;
      color: #D4AF37; border-radius: 8px; font-size: 0.9rem;
      cursor: pointer; transition: all 0.3s ease;
    }
    .retry-btn:hover { background: rgba(212,175,55,.15); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>暂时离线</h1>
    <p>您的私享管家需要网络连接才能为您服务。<br>请检查网络后重试。</p>
    <button class="retry-btn" onclick="location.reload()">重新连接</button>
  </div>
</body>
</html>
